name: tneb_bill_splitter
description: "TNEB Bill Splitter - Electricity bill calculator for shared residential meters."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Local database for monthly bill history
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # Persisted key-value settings (tariff rates, house/meter config)
  shared_preferences: ^2.2.3

  # PDF bill generation
  pdf: ^3.11.1
  printing: ^5.13.1

  # Share generated PDF (e.g. via WhatsApp)
  share_plus: ^9.0.0

  # Formatting numbers/currency and dates
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
