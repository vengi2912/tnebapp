name: Build Release APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Xmx2048m -XX:MaxMetaspaceSize=512m"
      _JAVA_OPTIONS: "-Xmx2048m"

    steps:
      - uses: actions/checkout@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Remove hardcoded Xmx from gradle files
        run: |
          find android -name "*.gradle" -o -name "gradle.properties" | xargs sed -i 's/-Xmx64m//g'
          find android -name "*.gradle" -o -name "gradle.properties" | xargs sed -i 's/-Xmx512m//g'
          find android -name "*.gradle" -o -name "gradle.properties" | xargs sed -i 's/-Xmx1024m//g'

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tneb-bill-splitter-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
